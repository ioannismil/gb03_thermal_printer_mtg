<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MTG Thermal Printer</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      margin-bottom: 6px;
      color: #e2b714;
    }

    .subtitle {
      font-size: 0.8rem;
      color: #888;
      margin-bottom: 20px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0;
      width: 100%;
      max-width: 400px;
      margin-bottom: 16px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #333;
    }

    .tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      font-size: 0.9rem;
      font-weight: 600;
      background: #16213e;
      color: #888;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s;
    }

    .tab.active {
      background: #0f3460;
      color: #e2b714;
    }

    .page {
      display: none;
      width: 100%;
      max-width: 400px;
    }

    .page.active {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Shared */
    .controls {
      display: flex;
      gap: 10px;
      width: 100%;
      margin-bottom: 16px;
    }

    input[type="number"],
    input[type="text"] {
      flex: 1;
      padding: 14px;
      font-size: 1.1rem;
      border: 2px solid #333;
      border-radius: 10px;
      background: #16213e;
      color: #fff;
      text-align: center;
      outline: none;
    }

    input:focus {
      border-color: #e2b714;
    }

    button {
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:active {
      opacity: 0.7;
    }

    button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-connect {
      background: #0f3460;
      color: #e2b714;
      width: 100%;
      max-width: 400px;
      margin-bottom: 12px;
    }

    .btn-connect.connected {
      background: #1a5c2a;
    }

    .btn-print {
      background: #e2b714;
      color: #1a1a2e;
    }

    .btn-search {
      background: #0f3460;
      color: #e2b714;
    }

    #log {
      width: 100%;
      max-width: 400px;
      background: #0a0a1a;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Courier New', monospace;
      font-size: 0.75rem;
      color: #6f6;
      max-height: 120px;
      overflow-y: auto;
      margin-bottom: 16px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .card-preview {
      width: 100%;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .card-preview img {
      width: 100%;
      display: block;
    }

    .card-info {
      padding: 14px;
    }

    .card-info h2 {
      font-size: 1.1rem;
      color: #e2b714;
    }

    .card-info .mana {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 6px;
    }

    .card-info .type {
      font-size: 0.85rem;
      color: #ccc;
      margin-bottom: 6px;
      font-style: italic;
    }

    .card-info .oracle {
      font-size: 0.85rem;
      color: #ddd;
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .card-info .pt {
      font-size: 1rem;
      font-weight: 700;
      color: #e2b714;
    }

    .card-info .set {
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
    }

    .card-preview.empty {
      display: none;
    }

    #printCanvas {
      display: none;
    }

    /* Search results */
    .search-results {
      width: 100%;
      margin-bottom: 16px;
    }

    .search-results.empty {
      display: none;
    }

    .search-result {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: #16213e;
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.2s;
    }

    .search-result:hover,
    .search-result.selected {
      border-color: #e2b714;
    }

    .search-result img {
      width: 48px;
      height: 67px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .search-result-info {
      flex: 1;
      min-width: 0;
    }

    .search-result-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e2b714;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-result-detail {
      font-size: 0.75rem;
      color: #999;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .search-hint {
      font-size: 0.8rem;
      color: #666;
      text-align: center;
      margin-bottom: 12px;
    }
  </style>
</head>

<body>

  <h1>MTG Thermal Printer</h1>
  <p class="subtitle">GB03 Bluetooth - Web Bluetooth API</p>

  <button class="btn-connect" id="btnConnect">Connect to Printer</button>

  <div class="tabs">
    <button class="tab active" data-page="randomPage">Random</button>
    <button class="tab" data-page="searchPage">Search</button>
  </div>

  <!-- Random Page -->
  <div class="page active" id="randomPage">
    <div class="controls">
      <input type="number" id="manaInput" min="0" max="20" value="3" placeholder="Mana value">
      <button class="btn-print" id="btnPrint" disabled>Print</button>
    </div>
    <div class="card-preview empty" id="CardPreview">
      <img id="CardArt" alt="">
      <div class="card-info">
        <h2 id="CardName"></h2>
        <div class="mana" id="CardMana"></div>
        <div class="type" id="CardType"></div>
        <div class="oracle" id="CardOracle"></div>
        <div class="pt" id="CardPT"></div>
        <div class="set" id="CardSet"></div>
      </div>
    </div>
  </div>

  <!-- Search Page -->
  <div class="page" id="searchPage">
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search card name...">
      <button class="btn-search" id="btnSearch">Search</button>
    </div>
    <div class="search-results empty" id="searchResults"></div>
    <div class="card-preview empty" id="searchCardPreview">
      <img id="searchCardArt" alt="">
      <div class="card-info">
        <h2 id="searchCardName"></h2>
        <div class="mana" id="searchCardMana"></div>
        <div class="type" id="searchCardType"></div>
        <div class="oracle" id="searchCardOracle"></div>
        <div class="pt" id="searchCardPT"></div>
        <div class="set" id="searchCardSet"></div>
      </div>
    </div>
    <button class="btn-print" id="btnSearchPrint" disabled style="width:100%">Print Selected Card</button>
  </div>

  <div id="log"></div>
  <canvas id="printCanvas"></canvas>

  <script>
    // -- GB03 Protocol --
    const AE01 = "0000ae01-0000-1000-8000-00805f9b34fb";
    const AE02 = "0000ae02-0000-1000-8000-00805f9b34fb";
    const SERVICE = "0000ae30-0000-1000-8000-00805f9b34fb";
    const PRINT_WIDTH = 384;

    const CRC8_TABLE = [
      0x00, 0x07, 0x0E, 0x09, 0x1C, 0x1B, 0x12, 0x15, 0x38, 0x3F, 0x36, 0x31, 0x24, 0x23, 0x2A, 0x2D,
      0x70, 0x77, 0x7E, 0x79, 0x6C, 0x6B, 0x62, 0x65, 0x48, 0x4F, 0x46, 0x41, 0x54, 0x53, 0x5A, 0x5D,
      0xE0, 0xE7, 0xEE, 0xE9, 0xFC, 0xFB, 0xF2, 0xF5, 0xD8, 0xDF, 0xD6, 0xD1, 0xC4, 0xC3, 0xCA, 0xCD,
      0x90, 0x97, 0x9E, 0x99, 0x8C, 0x8B, 0x82, 0x85, 0xA8, 0xAF, 0xA6, 0xA1, 0xB4, 0xB3, 0xBA, 0xBD,
      0xC7, 0xC0, 0xC9, 0xCE, 0xDB, 0xDC, 0xD5, 0xD2, 0xFF, 0xF8, 0xF1, 0xF6, 0xE3, 0xE4, 0xED, 0xEA,
      0xB7, 0xB0, 0xB9, 0xBE, 0xAB, 0xAC, 0xA5, 0xA2, 0x8F, 0x88, 0x81, 0x86, 0x93, 0x94, 0x9D, 0x9A,
      0x27, 0x20, 0x29, 0x2E, 0x3B, 0x3C, 0x35, 0x32, 0x1F, 0x18, 0x11, 0x16, 0x03, 0x04, 0x0D, 0x0A,
      0x57, 0x50, 0x59, 0x5E, 0x4B, 0x4C, 0x45, 0x42, 0x6F, 0x68, 0x61, 0x66, 0x73, 0x74, 0x7D, 0x7A,
      0x89, 0x8E, 0x87, 0x80, 0x95, 0x92, 0x9B, 0x9C, 0xB1, 0xB6, 0xBF, 0xB8, 0xAD, 0xAA, 0xA3, 0xA4,
      0xF9, 0xFE, 0xF7, 0xF0, 0xE5, 0xE2, 0xEB, 0xEC, 0xC1, 0xC6, 0xCF, 0xC8, 0xDD, 0xDA, 0xD3, 0xD4,
      0x69, 0x6E, 0x67, 0x60, 0x75, 0x72, 0x7B, 0x7C, 0x51, 0x56, 0x5F, 0x58, 0x4D, 0x4A, 0x43, 0x44,
      0x19, 0x1E, 0x17, 0x10, 0x05, 0x02, 0x0B, 0x0C, 0x21, 0x26, 0x2F, 0x28, 0x3D, 0x3A, 0x33, 0x34,
      0x4E, 0x49, 0x40, 0x47, 0x52, 0x55, 0x5C, 0x5B, 0x76, 0x71, 0x78, 0x7F, 0x6A, 0x6D, 0x64, 0x63,
      0x3E, 0x39, 0x30, 0x37, 0x22, 0x25, 0x2C, 0x2B, 0x06, 0x01, 0x08, 0x0F, 0x1A, 0x1D, 0x14, 0x13,
      0xAE, 0xA9, 0xA0, 0xA7, 0xB2, 0xB5, 0xBC, 0xBB, 0x96, 0x91, 0x98, 0x9F, 0x8A, 0x8D, 0x84, 0x83,
      0xDE, 0xD9, 0xD0, 0xD7, 0xC2, 0xC5, 0xCC, 0xCB, 0xE6, 0xE1, 0xE8, 0xEF, 0xFA, 0xFD, 0xF4, 0xF3,
    ];

    function crc8(data) {
      let cs = 0;
      for (const b of data) cs = CRC8_TABLE[cs ^ b];
      return cs;
    }

    function makePacket(opcode, data = [0x00]) {
      const len = data.length;
      const pkt = [0x51, 0x78, opcode, 0x00, len & 0xFF, (len >> 8) & 0xFF, ...data, crc8(data), 0xFF];
      return new Uint8Array(pkt);
    }

    const CMD_GET_STATUS = makePacket(0xA3);
    const CMD_LATTICE_START = makePacket(0xA6, [0xAA, 0x55, 0x17, 0x38, 0x44, 0x5F, 0x5F, 0x5F, 0x44, 0x38, 0x2C]);
    const CMD_LATTICE_END = makePacket(0xA6, [0xAA, 0x55, 0x17, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x17]);

    function cmdFeed(rows) { return makePacket(0xA1, [rows & 0xFF, (rows >> 8) & 0xFF]); }
    function cmdSetEnergy(v) { return makePacket(0xAF, [v & 0xFF, (v >> 8) & 0xFF]); }
    function cmdDrawingMode(m) { return makePacket(0xBE, [m]); }
    function cmdSetSpeed(s) { return makePacket(0xBD, [s]); }
    function cmdPrintRow(rowBytes) { return makePacket(0xA2, Array.from(rowBytes)); }

    // -- BLE State --
    let writeChar = null;
    let notifyChar = null;
    let device = null;

    // -- UI --
    const logEl = document.getElementById("log");
    const btnConnect = document.getElementById("btnConnect");
    const btnPrint = document.getElementById("btnPrint");
    const btnSearchPrint = document.getElementById("btnSearchPrint");
    const manaInput = document.getElementById("manaInput");
    const searchInput = document.getElementById("searchInput");
    const btnSearch = document.getElementById("btnSearch");

    function log(msg) {
      logEl.textContent += msg + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    // -- Tabs --
    let searchDebounceTimer = null;
    document.querySelectorAll(".tab").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById(tab.dataset.page).classList.add("active");
      });
    });

    // -- BLE Communication --
    async function sendData(data) {
      // Printer packets must be sent as full logical units; no lower-level fragmenting.
      // All protocol packets in this project are under BLE MTU limits (<200 bytes) by design.
      await writeChar.writeValueWithoutResponse(data);
    }

    async function sendPacket(pkt) { await sendData(pkt); }
    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    function updatePrintButtons() {
      const connected = !!writeChar;
      btnPrint.disabled = !connected;
      btnSearchPrint.disabled = !connected || !selectedSearchCard;
    }

    // -- Connect --
    btnConnect.addEventListener("click", async () => {
      try {
        log("Requesting BLE device...");
        device = await navigator.bluetooth.requestDevice({
          filters: [
            { namePrefix: "GB" },
            { namePrefix: "gb" },
            { namePrefix: "MTP" },
            { namePrefix: "Printer" },
          ],
          optionalServices: [SERVICE],
        });
        log(`Found: ${device.name}`);

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE);
        writeChar = await service.getCharacteristic(AE01);
        notifyChar = await service.getCharacteristic(AE02);

        try {
          await notifyChar.startNotifications();
        } catch (e) {
          log(`Notify subscribe failed (continuing): ${e.message}`);
        }
        log("Connected!");

        btnConnect.textContent = `Connected: ${device.name}`;
        btnConnect.classList.add("connected");
        updatePrintButtons();
      } catch (e) {
        log(`Connect error: ${e.message}`);
      }
    });

    // -- Scryfall API --
    async function fetchRandomCard(mv) {
      const resp = await fetch(`https://api.scryfall.com/cards/random?q=mv%3D${mv}+t%3Acreature`);
      if (!resp.ok) throw new Error(`Scryfall ${resp.status}`);
      return resp.json();
    }

    async function searchCards(query) {
      const resp = await fetch(`https://api.scryfall.com/cards/autocomplete?q=${encodeURIComponent(query)}`);
      if (!resp.ok) throw new Error(`Scryfall ${resp.status}`);
      const data = await resp.json();
      return data.data || []; // returns array of card name strings
    }

    async function fetchCardByName(name) {
      const resp = await fetch(`https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}`);
      if (!resp.ok) throw new Error(`Scryfall ${resp.status}`);
      return resp.json();
    }

    function getCardImageUrls(card) {
      const urls = [];
      const push = (uris) => {
        if (!uris) return;
        if (uris["art_crop"]) urls.push(uris["art_crop"]);
      };

      push(card.image_uris);
      if (card.card_faces) {
        for (const face of card.card_faces) {
          push(face.image_uris);
        }
      }

      return [...new Set(urls)];
    }

    function getCardImageUrl(card) {
      const urls = getCardImageUrls(card);
      return urls.length ? urls[0] : null;
    }

    function getCardSmallUrl(card) {
      const urls = getCardImageUrls(card);
      return urls.length ? urls[urls.length - 1] : null;
    }

    async function loadCardArtByName(name) {
      const url = `https://api.scryfall.com/cards/named?fuzzy=${encodeURIComponent(name)}&format=image&version=art_crop`;
      log(`Fetching card art directly by name: ${url}`);
      return loadImage(url);
    }

    async function loadImage(url) {
      const proxyUrl = `/proxy?url=${encodeURIComponent(url)}`;
      log(`Loading image via local proxy: ${url}`);
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error("Failed to load image: " + url));
        img.src = proxyUrl;
      });
    }

    async function loadCardArt(card) {
      const urls = getCardImageUrls(card);
      const tried = new Set();

      for (const url of urls) {
        try {
          log(`Attempting card art URL: ${url}`);
          const img = await loadImage(url);
          return img;
        } catch (e) {
          tried.add(url);
          log(`Failed art URL ${url}: ${e.message}`);
        }
      }

      const previewUrls = [
        document.getElementById("searchCardArt")?.src,
        document.getElementById("CardArt")?.src,
      ].filter(u => u && !tried.has(u));

      for (const url of previewUrls) {
        try {
          log(`Attempting preview art URL fallback: ${url}`);
          const img = await loadImage(url);
          return img;
        } catch (e) {
          log(`Failed fallback art URL ${url}: ${e.message}`);
        }
      }

      if (card && card.name) {
        try {
          log(`Attempting direct art-only fetch by card name: ${card.name}`);
          const img = await loadCardArtByName(card.name);
          return img;
        } catch (e) {
          log(`Failed art-only fetch for ${card.name}: ${e.message}`);
        }
      }

      log("Art download failed for all URLs; printing without art.");
      return null;
    }

    // -- Card Preview (shared helper) --
    function showPreview(card, artUrl, prefix) {
      const preview = document.getElementById(prefix + "CardPreview");
      preview.classList.remove("empty");
      document.getElementById(prefix + "CardArt").src = artUrl || "";
      document.getElementById(prefix + "CardName").textContent = card.name || "Unknown";
      document.getElementById(prefix + "CardMana").textContent = card.mana_cost || "";
      document.getElementById(prefix + "CardType").textContent = card.type_line || "";

      let oracle = card.oracle_text || "";
      if (!oracle && card.card_faces) oracle = card.card_faces[0].oracle_text || "";
      document.getElementById(prefix + "CardOracle").textContent = oracle;

      const pt = (card.power != null && card.toughness != null) ? `${card.power}/${card.toughness}` : "";
      document.getElementById(prefix + "CardPT").textContent = pt;
      document.getElementById(prefix + "CardSet").textContent =
        `${card.set_name || ""} — ${(card.rarity || "").charAt(0).toUpperCase() + (card.rarity || "").slice(1)}`;
    }

    // -- Render to Canvas --
    function renderCardBitmap(card, artImg) {
      const canvas = document.getElementById("printCanvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      canvas.width = PRINT_WIDTH;

      const padding = 8;
      const lineSpacing = 4;
      const titleFont = "bold 22px sans-serif";
      const bodyFont = "16px sans-serif";

      const name = card.name || "Unknown";
      let manaCost = card.mana_cost || "";
      const typeLine = card.type_line || "";
      let oracleText = card.oracle_text || "";
      const power = card.power;
      const toughness = card.toughness;
      const rarity = (card.rarity || "").charAt(0).toUpperCase() + (card.rarity || "").slice(1);
      const setName = card.set_name || "";

      if (!oracleText && card.card_faces) {
        oracleText = card.card_faces[0].oracle_text || "";
        if (!manaCost) manaCost = card.card_faces[0].mana_cost || "";
      }

      function wrapText(ctx, text, maxWidth) {
        const lines = [];
        for (const paragraph of text.split("\n")) {
          const words = paragraph.split(" ");
          let line = "";
          for (const word of words) {
            const test = line ? line + " " + word : word;
            if (ctx.measureText(test).width > maxWidth && line) {
              lines.push(line);
              line = word;
            } else {
              line = test;
            }
          }
          if (line) lines.push(line);
        }
        return lines;
      }

      // first pass compute height
      let y = padding;
      const maxW = PRINT_WIDTH - padding * 2;

      ctx.font = titleFont;
      const nameMetrics = ctx.measureText(name);
      y += nameMetrics.actualBoundingBoxAscent + nameMetrics.actualBoundingBoxDescent + lineSpacing;

      ctx.font = bodyFont;
      const manaMetrics = ctx.measureText(manaCost);
      y += manaMetrics.actualBoundingBoxAscent + manaMetrics.actualBoundingBoxDescent + lineSpacing + padding;

      let artH = 0;
      if (artImg) {
        const ratio = PRINT_WIDTH / artImg.width;
        artH = Math.round(artImg.height * ratio);
        y += artH + padding;
      }

      const bodyParts = [];
      if (typeLine) bodyParts.push({ text: typeLine, font: bodyFont });
      if (oracleText) {
        for (const line of wrapText(ctx, oracleText, maxW)) bodyParts.push({ text: line, font: bodyFont });
      }
      if (power != null && toughness != null) bodyParts.push({ text: `${power}/${toughness}`, font: "bold 18px sans-serif" });
      bodyParts.push({ text: `${setName} — ${rarity}`, font: bodyFont });

      for (const part of bodyParts) {
        ctx.font = part.font;
        const m = ctx.measureText(part.text);
        y += m.actualBoundingBoxAscent + m.actualBoundingBoxDescent + lineSpacing * 2;
      }

      y += padding;

      canvas.height = Math.max(y, artH + padding * 2);

      // render
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";

      y = padding;
      ctx.font = titleFont;
      ctx.textAlign = "center";
      ctx.fillText(name, PRINT_WIDTH / 2, y + nameMetrics.actualBoundingBoxAscent);
      y += nameMetrics.actualBoundingBoxAscent + nameMetrics.actualBoundingBoxDescent + lineSpacing;

      ctx.font = bodyFont;
      ctx.fillText(manaCost, PRINT_WIDTH / 2, y + manaMetrics.actualBoundingBoxAscent);
      y += manaMetrics.actualBoundingBoxAscent + manaMetrics.actualBoundingBoxDescent + lineSpacing + padding;

      if (artImg) {
        ctx.drawImage(artImg, 0, y, PRINT_WIDTH, artH);
        y += artH + padding;
      }

      ctx.textAlign = "left";
      for (const part of bodyParts) {
        ctx.font = part.font;
        const m = ctx.measureText(part.text);
        y += m.actualBoundingBoxAscent + lineSpacing;
        ctx.fillText(part.text, padding, y);
        y += m.actualBoundingBoxDescent + lineSpacing;
      }

      return canvas;
    }

    // -- Canvas to printer bitmap rows --
    function canvasToRows(canvas) {
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const pixels = imgData.data;
      const rows = [];
      for (let y = 0; y < canvas.height; y++) {
        const row = new Uint8Array(48);
        for (let x = 0; x < PRINT_WIDTH; x++) {
          const idx = (y * canvas.width + x) * 4;
          const gray = pixels[idx] * 0.299 + pixels[idx + 1] * 0.587 + pixels[idx + 2] * 0.114;
          if (gray < 128) row[x >> 3] |= (1 << (x & 7));
        }
        rows.push(row);
      }
      return rows;
    }

    // -- Print a card object --
    async function printCard(card) {
      if (!writeChar) { log("Not connected!"); return; }

      log("Downloading art...");
      const artImg = await loadCardArt(card);
      if (!artImg) {
        log("No art available; skipping print (art-only mode).");
        return;
      }

      log("Rendering bitmap...");
      const canvas = renderCardBitmap(card, artImg);
      const rows = canvasToRows(canvas);
      log(`Image: ${canvas.width}x${canvas.height} px, ${rows.length} rows`);

      log("Sending to printer...");
      await sendPacket(CMD_GET_STATUS);
      await sendPacket(cmdDrawingMode(0x00));
      await sendPacket(cmdSetSpeed(35));
      await sendPacket(cmdSetEnergy(12000));
      await sendPacket(CMD_LATTICE_START);
      await sleep(50);

      for (let i = 0; i < rows.length; i++) {
        const pkt = cmdPrintRow(rows[i]);
        await sendPacket(pkt);
        if (i % 8 === 7) {
          // small pacing to avoid write queue overflow
          await sleep(10);
        }
      }

      await sendPacket(cmdFeed(80));
      await sendPacket(CMD_LATTICE_END);
      await sendPacket(CMD_GET_STATUS);
      await sleep(300);

      log("Done! Check printer.");
    }

    // -- Random Page: Print --
    btnPrint.addEventListener("click", async () => {
      btnPrint.disabled = true;
      try {
        const mv = parseInt(manaInput.value) || 0;
        log(`Fetching random creature with MV ${mv}...`);
        const card = await fetchRandomCard(mv);
        log(`Got: ${card.name} ${card.mana_cost || ""}`);
        const artUrl = getCardImageUrl(card);
        showPreview(card, artUrl, "");
        await printCard(card);
      } catch (e) {
        log(`Error: ${e.message}`);
      } finally {
        btnPrint.disabled = !writeChar;
      }
    });

    // -- Search Page --
    let selectedSearchCard = null;

    // Live search with debounce
    searchInput.addEventListener("input", () => {
      clearTimeout(searchDebounceTimer);
      const query = searchInput.value.trim();
      if (query.length < 2) {
        document.getElementById("searchResults").classList.add("empty");
        document.getElementById("searchResults").innerHTML = "";
        return;
      }
      searchDebounceTimer = setTimeout(() => doSearch(query), 300);
    });

    btnSearch.addEventListener("click", () => {
      const query = searchInput.value.trim();
      if (query.length >= 2) doSearch(query);
    });

    searchInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        const query = searchInput.value.trim();
        if (query.length >= 2) doSearch(query);
      }
    });

    async function doSearch(query) {
      const resultsEl = document.getElementById("searchResults");
      try {
        log(`Searching: "${query}"...`);
        const names = await searchCards(query);
        if (names.length === 0) {
          resultsEl.innerHTML = '<div class="search-hint">No cards found.</div>';
          resultsEl.classList.remove("empty");
          return;
        }
        log(`Found ${names.length} results.`);

        resultsEl.innerHTML = "";
        resultsEl.classList.remove("empty");

        for (const name of names.slice(0, 8)) {
          const el = document.createElement("div");
          el.className = "search-result";
          el.innerHTML = `
        <div class="search-result-info">
          <div class="search-result-name">${escapeHtml(name)}</div>
        </div>
      `;
          el.addEventListener("click", () => selectCard(name, el));
          resultsEl.appendChild(el);
        }
      } catch (e) {
        log(`Search error: ${e.message}`);
      }
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str;
      return div.innerHTML;
    }

    async function selectCard(name, el) {
      // Highlight selected
      document.querySelectorAll(".search-result").forEach(r => r.classList.remove("selected"));
      el.classList.add("selected");

      try {
        log(`Loading: ${name}...`);
        const card = await fetchCardByName(name);          // Full card object like Random
        selectedSearchCard = card;
        const artUrl = getCardImageUrl(card);
        showPreview(card, artUrl, "search");
        updatePrintButtons();
        log(`Selected: ${card.name}`);
      } catch (e) {
        log(`Error loading card: ${e.message}`);
      }
    }

    // -- Search Page: Print --
    btnSearchPrint.addEventListener("click", async () => {
      if (!selectedSearchCard) return;
      btnSearchPrint.disabled = true;
      try {
        log(`Printing: ${selectedSearchCard.name}...`);
        await printCard(selectedSearchCard);
      } catch (e) {
        log(`Error: ${e.message}`);
      } finally {
        updatePrintButtons();
      }
    });
  </script>
</body>

</html>
